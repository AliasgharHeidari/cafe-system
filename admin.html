<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت | کافه دلنشین</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="header-logo">
                <i class="fas fa-mug-hot"></i>
                <h1>پنل مدیریت کافه</h1>
            </div>
            <div class="header-buttons">
                <span style="background: #1e40af; padding: 8px 16px; border-radius: 9999px; font-size: 14px;">
                    <i class="fas fa-user"></i> <span id="usernameDisplay">ادمین</span>
                </span>
                <button onclick="logout()" style="background: #dc2626; color: white; border: none; padding: 8px 20px; border-radius: 9999px; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- تب‌ها -->
        <div class="tabs-container">
            <button class="tab-btn active" id="tabProductsBtn" onclick="switchTab('products')">
                <i class="fas fa-coffee"></i> مدیریت محصولات
            </button>
            <button class="tab-btn" id="tabFeedbacksBtn" onclick="switchTab('feedbacks')">
                <i class="fas fa-comments"></i> بازخوردها
            </button>
        </div>

        <!-- تب محصولات -->
        <div id="productsTab">
            <button class="add-btn" onclick="showAddProductModal()">
                <i class="fas fa-plus"></i> افزودن محصول جدید
            </button>
            <div class="admin-card">
                <div id="productsList" class="admin-table">
                    <div style="text-align: center; padding: 48px;">
                        <div class="loading-spinner"></div>
                        <p style="margin-top: 16px;">در حال بارگذاری محصولات...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- تب بازخوردها -->
        <div id="feedbacksTab" style="display: none;">
            <div class="admin-card">
                <div id="feedbacksList" class="admin-table">
                    <div style="text-align: center; padding: 48px;">
                        <div class="loading-spinner"></div>
                        <p style="margin-top: 16px;">در حال بارگذاری بازخوردها...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- مدال محصول -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">افزودن محصول جدید</h2>
            </div>
            <form id="productForm">
                <div class="modal-body">
                    <input type="hidden" id="productId">
                    <div class="form-group">
                        <label>عنوان محصول *</label>
                        <input type="text" id="productTitle" required>
                    </div>
                    <div class="form-group">
                        <label>قیمت (تومان) *</label>
                        <input type="number" id="productPrice" required>
                    </div>
                    <div class="form-group">
                        <label>توضیحات</label>
                        <textarea id="productDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>لینک تصویر</label>
                        <input type="url" id="productImageLink" placeholder="https://example.com/image.jpg">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn-submit" style="flex: 1;">ذخیره</button>
                    <button type="button" onclick="closeModal()" style="flex: 1; background: #9ca3af; color: white; border: none; border-radius: 12px; cursor: pointer;">انصراف</button>
                </div>
            </form>
        </div>
    </div>

    <div class="back-to-top" id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </div>

    <script>
        const API_BASE = 'http://localhost:4000';
        
        // بررسی احراز هویت
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'login.html';
        }
        
        const username = localStorage.getItem('adminUsername');
        if (username) {
            document.getElementById('usernameDisplay').textContent = username;
        }
        
        function getAuthHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
            };
        }
        
        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUsername');
            window.location.href = 'login.html';
        }
        
        function switchTab(tab) {
            const productsTab = document.getElementById('productsTab');
            const feedbacksTab = document.getElementById('feedbacksTab');
            const productsBtn = document.getElementById('tabProductsBtn');
            const feedbacksBtn = document.getElementById('tabFeedbacksBtn');
            
            if (tab === 'products') {
                productsTab.style.display = 'block';
                feedbacksTab.style.display = 'none';
                productsBtn.classList.add('active');
                feedbacksBtn.classList.remove('active');
                loadProducts();
            } else {
                productsTab.style.display = 'none';
                feedbacksTab.style.display = 'block';
                feedbacksBtn.classList.add('active');
                productsBtn.classList.remove('active');
                loadFeedbacks();
            }
        }
        
        function safeText(str) {
            if (!str) return '';
            return String(str);
        }
        
        function showPrice(price) {
            if (price && price > 0) return price.toLocaleString() + ' تومان';
            return 'نامشخص';
        }
        
        async function loadProducts() {
            const container = document.getElementById('productsList');
            container.innerHTML = '<div style="text-align: center; padding: 48px;"><div class="loading-spinner"></div><p style="margin-top: 16px;">در حال بارگذاری...</p></div>';
            
            try {
                const response = await fetch(`${API_BASE}/panel/product`, { headers: getAuthHeaders() });
                if (response.status === 401) return logout();
                if (!response.ok) throw new Error(`خطا: ${response.status}`);
                
                const products = await response.json();
                if (!products || products.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 48px;"><p>هیچ محصولی یافت نشد</p></div>';
                    return;
                }
                
                let html = `<table>
                    <thead>
                        <tr><th>تصویر</th><th>عنوان</th><th>قیمت</th><th>عملیات</th></tr>
                    </thead>
                    <tbody>`;
                
                for (const p of products) {
                    const id = p.id || p.ID;
                    const title = p.title || p.Title || 'بدون عنوان';
                    const price = p.price || p.Price || 0;
                    const imageLink = p.imageLink || p.ImageLink || '';
                    
                    html += `<tr>
                        <td>${imageLink ? `<img src="${imageLink}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 8px;">` : '<i class="fas fa-image" style="font-size: 24px; color: #9ca3af;"></i>'}</td>
                        <td style="font-weight: bold;">${safeText(title)}</td>
                        <td>${showPrice(price)}</td>
                        <td class="admin-actions">
                            <button class="edit-btn" onclick="editProduct(${id})"><i class="fas fa-edit"></i></button>
                            <button class="delete-btn" onclick="deleteProduct(${id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
                }
                
                html += `</tbody></table>`;
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `<div style="text-align: center; padding: 48px; color: #ef4444;">خطا: ${error.message}</div>`;
            }
        }
        
        async function loadFeedbacks() {
            const container = document.getElementById('feedbacksList');
            container.innerHTML = '<div style="text-align: center; padding: 48px;"><div class="loading-spinner"></div><p style="margin-top: 16px;">در حال بارگذاری...</p></div>';
            
            try {
                const response = await fetch(`${API_BASE}/panel/feedback`, { headers: getAuthHeaders() });
                if (response.status === 401) return logout();
                if (!response.ok) throw new Error(`خطا: ${response.status}`);
                
                const feedbacks = await response.json();
                if (!feedbacks || feedbacks.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 48px;"><p>هیچ بازخوردی یافت نشد</p></div>';
                    return;
                }
                
                let html = '<div style="padding: 16px;">';
                for (const fb of feedbacks) {
                    const id = fb.id || fb.ID;
                    const subject = fb.subject || fb.Subject || 'بدون موضوع';
                    const message = fb.message || fb.Message || '';
                    const date = new Date(fb.createdAt || fb.CreatedAt).toLocaleDateString('fa-IR');
                    
                    html += `
                        <div style="border-bottom: 1px solid #e5e7eb; padding: 16px; display: flex; justify-content: space-between; align-items: flex-start;">
                            <div>
                                <h3 style="font-weight: bold; color: #2563eb;">${safeText(subject)}</h3>
                                <p style="color: #6b7280; margin-top: 8px;">${safeText(message)}</p>
                                <p style="color: #9ca3af; font-size: 12px; margin-top: 8px;"><i class="fas fa-calendar"></i> ${date}</p>
                            </div>
                            <button class="delete-btn" onclick="deleteFeedback(${id})"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                }
                html += '</div>';
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `<div style="text-align: center; padding: 48px; color: #ef4444;">خطا: ${error.message}</div>`;
            }
        }
        
        function showAddProductModal() {
            document.getElementById('modalTitle').textContent = 'افزودن محصول جدید';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('productModal').style.display = 'flex';
        }
        
        async function editProduct(id) {
            try {
                const response = await fetch(`${API_BASE}/panel/product`, { headers: getAuthHeaders() });
                const products = await response.json();
                const product = products.find(p => (p.id || p.ID) === id);
                if (product) {
                    document.getElementById('modalTitle').textContent = 'ویرایش محصول';
                    document.getElementById('productId').value = product.id || product.ID;
                    document.getElementById('productTitle').value = product.title || product.Title;
                    document.getElementById('productPrice').value = product.price || product.Price;
                    document.getElementById('productDescription').value = product.description || product.Description || '';
                    document.getElementById('productImageLink').value = product.imageLink || product.ImageLink || '';
                    document.getElementById('productModal').style.display = 'flex';
                }
            } catch (error) {
                alert('خطا در بارگذاری اطلاعات محصول');
            }
        }
        
        async function deleteProduct(id) {
            if (!confirm('آیا از حذف این محصول مطمئن هستید؟')) return;
            try {
                const response = await fetch(`${API_BASE}/panel/product/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
                if (response.ok) {
                    alert('محصول با موفقیت حذف شد');
                    loadProducts();
                } else {
                    const data = await response.json();
                    alert(data.error || 'خطا در حذف محصول');
                }
            } catch (error) {
                alert('خطا در ارتباط با سرور');
            }
        }
        
        async function deleteFeedback(id) {
            if (!confirm('آیا از حذف این بازخورد مطمئن هستید؟')) return;
            try {
                const response = await fetch(`${API_BASE}/panel/feedback/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
                if (response.ok) {
                    alert('بازخورد با موفقیت حذف شد');
                    loadFeedbacks();
                } else {
                    const data = await response.json();
                    alert(data.error || 'خطا در حذف بازخورد');
                }
            } catch (error) {
                alert('خطا در ارتباط با سرور');
            }
        }
        
        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }
        
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const productId = document.getElementById('productId').value;
            const title = document.getElementById('productTitle').value;
            const price = parseFloat(document.getElementById('productPrice').value);
            const description = document.getElementById('productDescription').value;
            const imageLink = document.getElementById('productImageLink').value;
            const isEdit = productId !== '';
            
            let url = `${API_BASE}/panel/product`;
            let method = 'POST';
            let body = { title, price, description, imageLink };
            if (isEdit) {
                method = 'PATCH';
                url = `${API_BASE}/panel/product/${productId}`;
                body = {};
                if (title) body.title = title;
                if (price) body.price = price;
                if (description) body.description = description;
                if (imageLink) body.imageLink = imageLink;
            }
            
            try {
                const response = await fetch(url, { method, headers: getAuthHeaders(), body: JSON.stringify(body) });
                if (response.ok) {
                    alert(isEdit ? 'تغییرات با موفقیت اعمال شد' : 'محصول با موفقیت اضافه شد');
                    closeModal();
                    loadProducts();
                } else {
                    const data = await response.json();
                    alert(data.error || 'خطا در ذخیره محصول');
                }
            } catch (error) {
                alert('خطا در ارتباط با سرور');
            }
        });
        
        document.getElementById('productModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('productModal')) closeModal();
        });
        
        window.addEventListener('scroll', function() {
            const backToTop = document.getElementById('backToTop');
            if (window.pageYOffset > 300) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }
        });
        
        loadProducts();
    </script>
</body>
</html>
