<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منوی کافه | کافه دلنشین</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="header-logo">
                <i class="fas fa-mug-hot"></i>
                <h1>کافه دلنشین</h1>
            </div>
            <div class="header-buttons">
                <a href="feedback.html" class="header-btn header-btn-feedback">
                    <i class="fas fa-comment-dots"></i> نظرات شما
                </a>
                <a href="login.html" class="header-btn header-btn-login">
                    <i class="fas fa-lock"></i> ورود مدیریت
                </a>
            </div>
        </div>
    </header>

    <div class="promo-banner">
        <i class="fas fa-truck"></i> سفارش‌های بالای ۲۰۰ هزار تومان، ارسال رایگان
    </div>

    <main class="container">
        <div class="page-title fade-in-up">
            <h2>منوی کافه</h2>
            <div class="title-line"></div>
            <p>طعم واقعی قهوه را با ما تجربه کنید</p>
        </div>

        <div id="products-container" class="products-grid">
            <div style="text-align: center; padding: 48px; grid-column: 1/-1;">
                <div class="loading-spinner"></div>
                <p style="margin-top: 16px; color: #6b7280;">در حال بارگذاری منو...</p>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <i class="fas fa-mug-hot"></i>
        <p>&copy; 2025 کافه دلنشین. تمامی حقوق محفوظ است.</p>
        <p style="color: #9ca3af; font-size: 14px;">ما را در اینستاگرام دنبال کنید</p>
        <div class="social-links">
            <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-link"><i class="fab fa-telegram"></i></a>
            <a href="#" class="social-link"><i class="fab fa-whatsapp"></i></a>
        </div>
    </footer>

    <div class="back-to-top" id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </div>

    <script>
        const API_BASE = 'http://localhost:4000';
        
        function safeText(str) {
            if (!str) return '';
            return String(str);
        }
        
        function showPrice(price) {
            if (price && price > 0) {
                return price.toLocaleString() + ' تومان';
            }
            return 'تماس بگیرید';
        }
        
        async function loadProducts() {
            const container = document.getElementById('products-container');
            
            try {
                const response = await fetch(`${API_BASE}/product`);
                if (!response.ok) throw new Error(`خطا: ${response.status}`);
                
                const products = await response.json();
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 48px; grid-column: 1/-1;"><i class="fas fa-coffee" style="font-size: 48px; color: #d1d5db;"></i><p style="margin-top: 16px; color: #6b7280;">هیچ محصولی یافت نشد</p></div>';
                    return;
                }
                
                let html = '';
                for (const p of products) {
                    const title = p.title || p.Title || 'بدون عنوان';
                    const price = p.price || p.Price || 0;
                    const description = p.description || p.Description || '';
                    const imageLink = p.imageLink || p.ImageLink || '';
                    
                    html += `
                        <div class="product-card fade-in-up">
                            ${imageLink ? 
                                `<img src="${imageLink}" alt="${title}" class="product-image" onerror="this.onerror=null; this.src='https://placehold.co/400x300?text=No+Image'">` : 
                                `<div class="product-image-placeholder"><i class="fas fa-mug-hot"></i></div>`
                            }
                            <div class="product-info">
                                <div class="product-header">
                                    <h3 class="product-title">${safeText(title)}</h3>
                                    <span class="product-price">${showPrice(price)}</span>
                                </div>
                                <p class="product-description">${safeText(description) || 'توضیحاتی برای این محصول ثبت نشده است'}</p>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `<div style="text-align: center; padding: 48px; grid-column: 1/-1; color: #ef4444;"><i class="fas fa-exclamation-triangle" style="font-size: 48px;"></i><p style="margin-top: 16px;">${error.message}</p><button onclick="location.reload()" style="margin-top: 16px; background: #2563eb; color: white; border: none; padding: 8px 24px; border-radius: 9999px; cursor: pointer;">تلاش مجدد</button></div>`;
            }
        }
        
        window.addEventListener('scroll', function() {
            const backToTop = document.getElementById('backToTop');
            if (window.pageYOffset > 300) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }
        });
        
        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
